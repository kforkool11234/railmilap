services:
  - type: web
    name: railmilap-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn railmilap_api.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: railmilap_api.settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: railmilap-db
          property: connectionString

databases:
  - name: railmilap-db
    plan: free
